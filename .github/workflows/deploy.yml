name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/hyeonim/samteo-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Normalize Gradle config for CI
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/^org.gradle.java.home=/d' gradle.properties
          fi

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -x test

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml,Caddyfile
          target: ~/samteo

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            mkdir -p ~/samteo
            cd ~/samteo
            if [ ! -f .env ]; then
              echo ".env is missing on the server. Create ~/samteo/.env before deploy."
              exit 1
            fi
            IMAGE_NAME=$(grep '^APP_IMAGE=' .env | cut -d '=' -f2-)
            IMAGE_NAME=${IMAGE_NAME:-ghcr.io/hyeonim/samteo-backend:latest}
            if echo "$IMAGE_NAME" | grep -q '^ghcr\.io/'; then
              if [ -z "$GHCR_USERNAME" ] || [ -z "$GHCR_TOKEN" ]; then
                echo "GHCR credentials are missing. Set GHCR_USERNAME and GHCR_TOKEN repository secrets, or make the package public."
                exit 1
              fi
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
