name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/hyeonim/samteo-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Normalize Gradle config for CI
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/^org.gradle.java.home=/d' gradle.properties
          fi

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean bootJar -x test

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create production env file
        run: |
          cat > .env.deploy <<'EOF'
          SPRING_PROFILES_ACTIVE=${{ vars.SPRING_PROFILES_ACTIVE || 'prod' }}
          DB_URL=${{ secrets.DB_URL }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DDL_AUTO=${{ vars.DDL_AUTO || 'update' }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION=${{ vars.JWT_EXPIRATION || '86400000' }}
          ODSAY_API_KEY=${{ secrets.ODSAY_API_KEY }}
          TOUR_API_KEY=${{ secrets.TOUR_API_KEY }}
          ALIO_API_KEY=${{ secrets.ALIO_API_KEY }}
          DEFAULT_HOURLY_WAGE=${{ vars.DEFAULT_HOURLY_WAGE || '10320' }}
          KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REDIRECT_URI=${{ vars.KAKAO_REDIRECT_URI || 'https://www.samteo.org/login/oauth2/code/kakao' }}
          APP_FRONTEND_URL=${{ vars.APP_FRONTEND_URL || 'https://www.samteo.org' }}
          APP_IMAGE=${{ vars.APP_IMAGE || 'ghcr.io/hyeonim/samteo-backend:latest' }}
          SITE_DOMAIN=${{ vars.SITE_DOMAIN || 'www.samteo.org' }}
          EOF

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml,Caddyfile,.env.deploy
          target: ~/samteo

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/samteo
            cd ~/samteo
            mv .env.deploy .env
            chmod 600 .env
            docker logout ghcr.io || true
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
