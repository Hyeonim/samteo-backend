server.port=8080

# Logging
logging.level.com.samteo=INFO
logging.level.org.springframework.web=WARN

# 관광인 API (empmnInfoList)
external.gwanwangin.base-url=https://apis.data.go.kr/B551011/tursmService

# 한국관광공사 국문 관광정보 OpenAPI
external.tourapi.base-url=https://apis.data.go.kr/B551011/KorService2

# ODsay public transit routing. Provide ODSAY_API_KEY or external.odsay.api-key in production secrets.
external.odsay.base-url=https://api.odsay.com/v1/api
external.odsay.api-key=${ODSAY_API_KEY:}
external.tourapi.api-key=${TOUR_API_KEY:}

# Kakao OAuth
kakao.client.id=${KAKAO_CLIENT_ID:}
kakao.client.secret=${KAKAO_CLIENT_SECRET:}
kakao.redirect.uri=${KAKAO_REDIRECT_URI:https://www.samteo.org/login/oauth2/code/kakao}

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Frontend
app.frontend-url=${APP_FRONTEND_URL:https://www.samteo.org}

# MariaDB RDS. Provide real values through environment variables in production.
spring.datasource.url=${DB_URL:jdbc:mariadb://samteo-mariadb.cz4qceswyc1x.ap-northeast-2.rds.amazonaws.com:3306/samteo}
spring.datasource.username=${DB_USERNAME:samteo_app}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true
