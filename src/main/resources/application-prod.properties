server.port=8080

# Logging
logging.level.com.samteo=INFO
logging.level.org.springframework.web=WARN

# PostgreSQL example. Provide real values through environment variables in production.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/samteo}
spring.datasource.username=${DB_USERNAME:samteo}
spring.datasource.password=${DB_PASSWORD:samteo}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
