server.port=8080

# Logging
logging.level.com.samteo=INFO
logging.level.org.springframework.web=WARN

# 관광인 API (empmnInfoList)
external.gwanwangin.base-url=https://apis.data.go.kr/B551011/tursmService

# TourAPI
external.tourapi.base-url=https://apis.data.go.kr/B551011/KorService2

# PostgreSQL example. Provide real values through environment variables in production.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/samteo}
spring.datasource.username=${DB_USERNAME:samteo}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
