server.port=8080

# PostgreSQL DataSource (docker compose: localhost:5444)
spring.datasource.url=jdbc:postgresql://localhost:5444/samteo
spring.datasource.username=samteo
spring.datasource.password=samteo
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 로그 레벨
logging.level.com.samteo=DEBUG
logging.level.org.springframework.web=DEBUG

# 관광인 API (empmnInfoList)
external.gwanwangin.base-url=https://apis.data.go.kr/B551011/tursmService
external.gwanwangin.api-key=${API_SERVICE_KEY:}

# TourAPI (한국관광공사)
external.tourapi.base-url=https://apis.data.go.kr/B551011/KorService2
external.tourapi.service-key=${API_SERVICE_KEY:}

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# Frontend URL
app.frontend-url=http://localhost:5173
