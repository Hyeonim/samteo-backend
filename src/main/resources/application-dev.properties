server.port=8080

# Logging
logging.level.com.samteo=DEBUG
logging.level.org.springframework.web=DEBUG

# H2 database for local development. Switch to PostgreSQL properties when the real DB is ready.
spring.datasource.url=jdbc:h2:mem:samteo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
