server.port=8080

# MariaDB DataSource
spring.datasource.url=${DEV_DB_URL:jdbc:mariadb://localhost:3306/samteo_db}
spring.datasource.username=${DEV_DB_USERNAME:samteo}
spring.datasource.password=${dev.datasource.password:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 로그 레벨
# Logging
logging.level.com.samteo=DEBUG
logging.level.org.springframework.web=DEBUG

# 관광인 API (empmnInfoList)
external.gwanwangin.base-url=https://apis.data.go.kr/B551011/tursmService

# TourAPI (한국관광공사)
external.tourapi.base-url=https://apis.data.go.kr/B551011/KorService2

# ODsay public transit routing. Put the real key in application-secret.properties.
external.odsay.base-url=https://api.odsay.com/v1/api

# JWT
jwt.expiration=86400000

# Frontend URL
app.frontend-url=http://localhost:5173

spring.jpa.open-in-view=false
