server.port=8080

# PostgreSQL DataSource (docker compose: localhost:5444)
spring.datasource.url=jdbc:postgresql://localhost:5444/samteo
spring.datasource.username=samteo
spring.datasource.password=${dev.datasource.password:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 로그 레벨
# Logging
logging.level.com.samteo=DEBUG
logging.level.org.springframework.web=DEBUG

# 관광인 API (empmnInfoList)
external.gwanwangin.base-url=https://apis.data.go.kr/B551011/tursmService

# TourAPI (한국관광공사)
external.tourapi.base-url=https://apis.data.go.kr/B551011/KorService2

# ODsay public transit routing. Put the real key in application-secret.properties.
external.odsay.base-url=https://api.odsay.com/v1/api

# JWT
jwt.expiration=86400000

# Frontend URL
app.frontend-url=http://localhost:5173

# H2 database for local development. Switch to PostgreSQL properties when the real DB is ready.
spring.datasource.url=jdbc:h2:mem:samteo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${dev.h2.datasource.password:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
