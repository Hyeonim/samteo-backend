spring.application.name=samteo
spring.profiles.active=dev
spring.config.import=optional:classpath:application-secret.properties

# Shared properties
kakao.redirect.uri=http://localhost:8080/login/oauth2/code/kakao

# ODsay public transit routing. Keep the key in application-secret.properties or ODSAY_API_KEY.
external.odsay.base-url=https://api.odsay.com/v1/api
external.odsay.api-key=${ODSAY_API_KEY:}
