spring.application.name=samteo
spring.profiles.active=dev
spring.config.import=optional:classpath:application-secret.properties

# Shared properties
kakao.redirect.uri=http://localhost:8080/login/oauth2/code/kakao

# Kakao OAuth
kakao.client.id=${KAKAO_CLIENT_ID:}
kakao.client.secret=${KAKAO_CLIENT_SECRET:}

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# Naver OAuth
naver.client.id=${NAVER_CLIENT_ID:}
naver.client.secret=${NAVER_CLIENT_SECRET:}
naver.redirect.uri=${NAVER_REDIRECT_URI:http://localhost:8080/login/oauth2/code/naver}

# ODsay public transit routing. Keep the key in application-secret.properties or ODSAY_API_KEY.
external.odsay.base-url=https://api.odsay.com/v1/api
external.odsay.api-key=${ODSAY_API_KEY:}

# Korea Tourism Organization TourAPI.
external.tourapi.base-url=https://apis.data.go.kr/B551011/KorService2
external.tourapi.api-key=${TOUR_API_KEY:}

# ALIO public institution recruitment API.
external.alio.base-url=https://opendata.alio.go.kr/new/odaApiMng/recrutInquiryAjaxList.do
external.alio.api-key=${ALIO_API_KEY:}
jobs.default-hourly-wage=${DEFAULT_HOURLY_WAGE:10320}

# SAMTEO read-only AI assistant. Keep the API key in environment variables.
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}

# Uploaded files are stored on local disk by default.
app.storage-type=${APP_STORAGE_TYPE:local}
app.upload-dir=${APP_UPLOAD_DIR:${java.io.tmpdir}/samteo/uploads}
app.upload-url-prefix=${APP_UPLOAD_URL_PREFIX:/uploads}

# S3 image storage. Used when app.storage-type=s3.
aws.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.public-base-url=${AWS_S3_PUBLIC_BASE_URL:}
