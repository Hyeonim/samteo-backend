services:
  mariadb:
    image: mariadb:11
    container_name: samteo-local-mariadb
    environment:
      MARIADB_DATABASE: samteo_db
      MARIADB_USER: samteo
      MARIADB_PASSWORD: samteo
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - samteo_local_mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  samteo_local_mariadb:
